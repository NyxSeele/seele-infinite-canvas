server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2048m;

    # 视频静态直出（需 docker-compose 将 uploads_data 挂到 /var/www/uploads）
    location ^~ /api/uploads/videos/ {
        set $media_original_uri $request_uri;
        auth_request /_media_auth;
        alias /var/www/uploads/videos/;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "private, max-age=3600" always;
        types {
            video/mp4 mp4;
            video/webm webm;
            video/quicktime mov;
        }
        default_type application/octet-stream;
    }

    location = /_media_auth {
        internal;
        proxy_pass http://backend:7788/api/media/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $media_original_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:7788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://backend:7788;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://backend:7788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
