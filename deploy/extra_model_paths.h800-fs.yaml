# H800 视频 Worker：文件存储（autodl-fs）为唯一真相来源。
# 新实例挂载同一块 FS 后，跑 deploy/h800-restore-env.sh 即可，无需重新下模型。
#
# 安装：
#   cp deploy/extra_model_paths.h800-fs.yaml /root/ComfyUI/extra_model_paths.yaml

autodl_fs:
    base_path: /root/autodl-fs/models/
    checkpoints: checkpoints/
    diffusion_models: diffusion_models/
    vae: vae/
    text_encoders: text_encoders/
    loras: loras/
    clip: clip/
    clip_vision: clip_vision/
    unet: unet/
    SEEDVR2: SEEDVR2/
