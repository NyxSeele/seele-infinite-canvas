# AutoDL / 裸机 Nginx 配置（AUTODL Runbook §9 复制此文件）
# 安装：cp deploy/nginx-autodl.conf /etc/nginx/sites-available/aistudio
# 按需修改 root= 前端 dist 路径；默认 listen 6006（AutoDL 自定义服务映射此端口）
# 然后：nginx -t && nginx -s reload
#
# 经 Cloudflare Tunnel 时：只暴露本端口即可（/api、/ws 已反代到 7788），
# 不必再单独发布 backend:7788 公网路由。

server {
    listen 6006;
    server_name _;

    root /root/autodl-tmp/AIStudio/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    # 静态资源：长缓存，便于 Cloudflare 边缘命中
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        add_header Cache-Control "no-store" always;
    }

    location /health {
        proxy_pass http://127.0.0.1:7788;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    location /ws {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
