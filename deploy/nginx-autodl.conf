# AutoDL / 裸机 Nginx 配置（AUTODL Runbook §9 复制此文件）
# 安装：cp deploy/nginx-autodl.conf /etc/nginx/sites-available/aistudio
# 按需修改 root= 前端 dist 路径；默认 listen 6006（AutoDL 自定义服务映射此端口）
# 然后：nginx -t && nginx -s reload

server {
    listen 6006;
    server_name _;

    root /root/autodl-tmp/AIStudio/frontend/dist;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:7788;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
