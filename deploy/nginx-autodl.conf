# AutoDL / 裸机 Nginx 配置（AUTODL Runbook §9 复制此文件）
# 安装：cp deploy/nginx-autodl.conf /etc/nginx/sites-available/aistudio
# 按需修改 root= 前端 dist 路径；默认 listen 6006（AutoDL 自定义服务映射此端口）
# 然后：nginx -t && nginx -s reload
#
# 经 Cloudflare Tunnel 时：只暴露本端口即可（/api、/ws 已反代到 7788），
# 不必再单独发布 backend:7788 公网路由。

server {
    listen 6006;
    server_name _;

    root /root/autodl-tmp/AIStudio/frontend/dist;
    index index.html;

    client_max_body_size 2048m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Tunnel 入口 + AutoDL 静态资源：跨域 ES module 需 CORS
    set $cors_tunnel_origin "https://velora.seele0420.cloud";

    # 静态资源：长缓存 + CORS（/assets/* 由 AutoDL 公网承载）
    location /assets/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_tunnel_origin;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header Access-Control-Allow-Origin $cors_tunnel_origin always;
        access_log off;
        try_files $uri =404;
    }

    # Workspace 背景可替换：禁止长缓存，换图后各端才能同步（?v= 仅用于 CSS 缓存破除）
    location = /workspace-bg.jpg {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_tunnel_origin;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin $cors_tunnel_origin always;
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_tunnel_origin;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin $cors_tunnel_origin always;
        access_log off;
        try_files $uri =404;
    }

    # 已生成/已上传视频：Nginx sendfile 直出，鉴权走 auth_request（不经后端传文件体）
    # 磁盘路径需与 backend cwd 下 uploads/videos 一致
    location ^~ /api/uploads/videos/ {
        # auth_request 子请求会改写 $request_uri，先保存原始 URI（含 ?mt=）
        set $media_original_uri $request_uri;
        auth_request /_media_auth;
        alias /root/autodl-tmp/AIStudio/backend/uploads/videos/;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "private, max-age=3600" always;
        types {
            video/mp4 mp4;
            video/webm webm;
            video/quicktime mov;
        }
        default_type application/octet-stream;
    }

    location = /_media_auth {
        internal;
        proxy_pass http://127.0.0.1:7788/api/media/auth-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $media_original_uri;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header Cache-Control "no-store" always;
    }

    location /health {
        proxy_pass http://127.0.0.1:7788;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store" always;
    }

    location /ws {
        proxy_pass http://127.0.0.1:7788;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # H800 运维脚本（不走 SPA fallback；目录在 dist 外，前端 build 不会清掉）
    location ^~ /h800-bootstrap/ {
        alias /root/autodl-tmp/share/h800-bootstrap/public/;
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "no-cache";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
