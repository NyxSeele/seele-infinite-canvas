# H800 视频 Worker：本地数据盘优先，文件存储作备份/冷数据。
# 用法（在 H800 上）：
#   bash deploy/h800-promote-video-models-to-local.sh
#   cp deploy/extra_model_paths.h800-local.yaml /root/ComfyUI/extra_model_paths.yaml
#   # 重启 ComfyUI

autodl_local:
    base_path: /root/autodl-tmp/ComfyUI/models/
    checkpoints: checkpoints/
    diffusion_models: diffusion_models/
    vae: vae/
    text_encoders: text_encoders/
    loras: loras/
    clip: clip/
    unet: unet/

autodl_fs:
    base_path: /root/autodl-fs/models/
    checkpoints: checkpoints/
    diffusion_models: diffusion_models/
    vae: vae/
    text_encoders: text_encoders/
    loras: loras/
    clip: clip/
    clip_vision: clip_vision/
    unet: unet/
